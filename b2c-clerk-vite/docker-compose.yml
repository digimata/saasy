services:
  postgres:
    image: postgres:17-alpine
    container_name: saasy-b2c-postgres
    ports:
      - "54330:5432"
    environment:
      POSTGRES_USER: saasy
      POSTGRES_PASSWORD: saasy
      POSTGRES_DB: saasy
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U saasy -d saasy"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres-data:
