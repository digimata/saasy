id: FL-001
title: Auth flows
covers: [/sign-in, /sign-up, /onboard, sign-out, otp, oauth]
last_run:
  commit: 39c4c3f
  result: pass

# Covers the core identity paths every user hits.
# Auth UX: email OTP flow (no password), animated transitions, OAuth row.

base_url: http://localhost:3000

nodes:
  sign-in:
    route: /sign-in
    expects:
      - input: "Enter your email address..."    # InputBubble placeholder
      - heading: "Welcome to Saasy."

  sign-up-redirect:
    route: /sign-in
    expects:
      - heading: "Welcome to Saasy."

  otp-step:
    route: /sign-in
    expects:
      - heading: "Enter the code you received"
      - text: "verification code"
      - button: "Verify your email"
      - button: Back

  otp-error:
    route: /sign-in
    expects:
      - text: error    # inline error message for wrong code

  setup:
    route: /onboard
    expects:
      - heading: "Create a workspace"
      - input: "Workspace name"
      - input: URL
      - button: "Create workspace"
      - text: "Logged in as"
      - link: "Sign out"

  dashboard:
    route: /
    expects:
      - heading: Overview
      - text: Revenue

edges:
  # --- Happy: Email → OTP → Setup → Dashboard ---
  - from: sign-in
    action: fill email input with "test-{{run_id}}@example.com", click arrow button
    to: otp-step
    note: "OTP code must be retrieved from server logs or test mailbox"

  # --- /sign-up redirects to /sign-in ---
  - from: direct:/sign-up
    precondition: unauthenticated
    expect-redirect: /sign-in
    to: sign-up-redirect

  # --- Back button on OTP step ---
  - from: otp-step
    action: click "Back"
    to: sign-in

  # --- Wrong OTP code ---
  - from: otp-step
    action: enter wrong code, click "Verify your email"
    to: otp-error
    note: "Should show inline error, stay on OTP step"

  # --- Expired OTP ---
  - from: otp-step
    action: wait for expiry, enter code, click "Verify your email"
    to: otp-error
    note: "Should show expired error with option to resend"

  # --- Google OAuth cancel ---
  - from: sign-in
    action: click Google button, deny/cancel on Google consent screen
    to: sign-in
    note: "Should return to sign-in without error state"

paths:
  sign-in-page-renders:
    description: "Sign-in page shows email input, heading, no card wrapper"
    sequence: [sign-in]
    precondition: unauthenticated

  sign-up-redirects:
    description: "/sign-up redirects to /sign-in"
    sequence: [sign-up-redirect]
    precondition: unauthenticated

  email-to-otp:
    description: "Submit email → animated transition to OTP step"
    sequence: [sign-in, otp-step]
    precondition: unauthenticated
    note: "Requires email OTP to be configured on the server"

  otp-back-button:
    description: "Back button returns from OTP to email step"
    sequence: [sign-in, otp-step, sign-in]
    precondition: unauthenticated

  wrong-otp:
    description: "Wrong OTP shows error, stays on OTP step"
    sequence: [sign-in, otp-step, otp-error]
    precondition: unauthenticated

  oauth-cancel:
    description: "Cancelling Google OAuth returns to sign-in cleanly"
    sequence: [sign-in, sign-in]
    precondition: unauthenticated
