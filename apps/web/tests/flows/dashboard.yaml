id: FL-002
title: Dashboard flows
covers: [/, /settings, /members, /billing, sidebar]
last_run:
  commit: a726d89
  result: skip

# Assumes authenticated user with active workspace.

base_url: http://localhost:3000
precondition: authenticated

nodes:
  dashboard:
    route: /
    expects:
      - heading: Overview
      - text: "Welcome to your workspace."
      - complementary: sidebar

  settings:
    route: /settings
    expects:
      - heading: "{{workspace_name}}"    # h2, shows the workspace name
      - text: "Workspace name"
      - text: "Delete workspace"
      - complementary: sidebar

  members:
    route: /members
    expects:
      - heading: Members
      - text: "member"
      - complementary: sidebar

  billing:
    route: /billing
    expects:
      - heading: Billing
      - text: "Manage your subscription."
      - complementary: sidebar

edges:
  - from: dashboard
    action: click "Settings"
    to: settings

  - from: dashboard
    action: click "Members"
    to: members

  - from: dashboard
    action: click "Billing"
    to: billing

  # Return to overview from each page
  - from: settings
    action: click "Overview"
    to: dashboard

  - from: members
    action: click "Overview"
    to: dashboard

  - from: billing
    action: click "Overview"
    to: dashboard

paths:
  sidebar-navigation:
    description: "Visit every dashboard page via sidebar and return"
    sequence: [dashboard, settings, dashboard, members, dashboard, billing, dashboard]
