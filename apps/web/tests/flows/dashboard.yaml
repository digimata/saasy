id: FL-002
title: Dashboard flows
covers: [/, /settings, sidebar, settings-tabs]
last_run:
  commit: 39c4c3f
  result: pass

# Assumes authenticated user with active workspace.

base_url: http://localhost:3000
precondition: authenticated

nodes:
  dashboard:
    route: /
    expects:
      - heading: Overview
      - text: Revenue

  settings:
    route: /settings
    expects:
      - heading: "{{workspace_name}}"    # h2, shows the workspace name
      - tab: General
      - tab: Members
      - tab: Billing
      - text: Workspace

  settings-members:
    route: /settings
    expects:
      - tab-active: Members
      - heading: Members
      - text: User

  settings-billing:
    route: /settings
    expects:
      - tab-active: Billing
      - text: "Manage your subscription."

edges:
  - from: dashboard
    action: click settings icon in sidebar (gear/slider icon, bottom of sidebar)
    to: settings

  - from: settings
    action: click "Members" tab
    to: settings-members

  - from: settings
    action: click "Billing" tab
    to: settings-billing

  - from: settings
    action: click first icon in sidebar (activity/overview icon, top of sidebar)
    to: dashboard

paths:
  sidebar-navigation:
    description: "Visit settings via sidebar, cycle through tabs, return to overview"
    sequence: [dashboard, settings, settings-members, settings-billing, dashboard]
