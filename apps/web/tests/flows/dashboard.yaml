id: FL-002
title: Dashboard flows
covers: [/, /settings, sidebar, settings-tabs]
last_run:
  commit: f78208a
  result: pass
  note: settings tabs verified in browser

# Assumes authenticated user with active workspace.

base_url: http://localhost:3000
precondition: authenticated

nodes:
  dashboard:
    route: /
    expects:
      - heading: Overview
      - text: "Welcome to your workspace."

  settings:
    route: /settings
    expects:
      - heading: "{{workspace_name}}"    # h2, shows the workspace name
      - tab: General
      - tab: Members
      - tab: Billing
      - text: "Workspace name"

  settings-members:
    route: /settings
    expects:
      - tab-active: Members
      - text: "member"

  settings-billing:
    route: /settings
    expects:
      - tab-active: Billing
      - text: "Manage your subscription."

edges:
  - from: dashboard
    action: click "Settings"
    to: settings

  - from: settings
    action: click "Members" tab
    to: settings-members

  - from: settings
    action: click "Billing" tab
    to: settings-billing

  - from: settings
    action: click "Overview"
    to: dashboard

paths:
  sidebar-navigation:
    description: "Visit settings via sidebar, cycle through tabs, return to overview"
    sequence: [dashboard, settings, settings-members, settings-billing, dashboard]
