id: FL-005
title: Billing flows
covers: [/settings?tab=billing, checkout, portal, invoices, unconfigured-state]
depends_on: [FL-001, FL-002]
last_run:
  commit: null
  result: null

# Covers the billing UX inside workspace settings.
# Assumes authenticated user with an active workspace.
#
# Upgrade flows should be asserted end to end:
# hobby -> checkout -> webhook sync -> paid billing state
#
# Portal-driven changes should be asserted on the resulting local state after
# webhook sync, not only on the external redirect.
#
# Important current limitation:
# the local model does not yet represent a future scheduled plan change
# (for example "downgrade to Pro at period end").
# So downgrade assertions in this file cover the applied post-webhook state,
# not a pending future downgrade banner.

base_url: http://localhost:3000

pages:
  billing-hobby:
    route: /settings?tab=billing
    expects:
      - tab-active: Billing
      - heading: Plan
      - text: Hobby
      - button: "Adjust plan"
      - heading: Invoices
      - text: "No invoices yet"

  billing-plan-dialog:
    route: /settings?tab=billing
    expects:
      - dialog-title: "Adjust your plan"
      - text: Hobby
      - text: Pro
      - text: Ultra
      - button: "Current plan"
      - button: "Choose plan"

  checkout-redirect:
    route: /settings?tab=billing
    expects:
      - external-url: stripe checkout

  billing-paid:
    route: /settings?tab=billing
    expects:
      - tab-active: Billing
      - heading: Plan
      - text: Pro
      - heading: Payment
      - button: "Manage in Stripe"
      - heading: Invoices

  billing-ultra:
    route: /settings?tab=billing
    expects:
      - tab-active: Billing
      - heading: Plan
      - text: Ultra
      - heading: Payment
      - button: "Manage in Stripe"
      - heading: Invoices

  billing-paid-canceling:
    route: /settings?tab=billing
    expects:
      - heading: Plan
      - text: "Your plan will end on"
      - button: "Manage in Stripe"

  billing-invoices-populated:
    route: /settings?tab=billing
    expects:
      - heading: Invoices
      - text: paid
      - text: View

  billing-invoices-more:
    route: /settings?tab=billing
    expects:
      - heading: Invoices
      - button: "Load more"

  billing-unconfigured:
    route: /settings?tab=billing
    expects:
      - text: "Billing is not configured."
      - text: STRIPE_SECRET_KEY

  portal-redirect:
    route: /settings?tab=billing
    expects:
      - external-url: stripe billing portal

actions:
  - from: billing-hobby
    precondition: authenticated, active workspace, hobby plan, billing configured
    action: click "Adjust plan"
    to: billing-plan-dialog

  - from: billing-plan-dialog
    precondition: authenticated, active workspace, hobby plan, billing configured
    action: click "Choose plan" under Pro
    to: checkout-redirect
    note: "Should create a hosted Stripe checkout session for Pro. After successful checkout and webhook sync, Billing should show plan Pro."

  - from: billing-plan-dialog
    precondition: authenticated, active workspace, hobby plan, billing configured
    action: click "Choose plan" under Ultra
    to: checkout-redirect
    note: "Should create a hosted Stripe checkout session for Ultra. After successful checkout and webhook sync, Billing should show plan Ultra."

  - from: billing-paid
    precondition: authenticated, active workspace, paid plan, billing configured
    action: click "Manage in Stripe"
    to: portal-redirect
    note: "Should open Stripe Customer Portal"

  - from: billing-paid
    precondition: authenticated, active workspace, Pro plan, billing configured
    action: open Stripe portal, upgrade to Ultra, return to app, wait for webhook sync
    to: billing-ultra
    note: "Local billing state should switch from Pro to Ultra after Stripe confirms the change."

  - from: billing-ultra
    precondition: authenticated, active workspace, Ultra plan, billing configured
    action: open Stripe portal, downgrade to Pro, return to app, wait for webhook sync
    to: billing-paid
    note: "This asserts the applied post-webhook downgrade state. If the portal configuration schedules downgrades for period end, add pending-plan modeling before asserting pre-application UI."

  - from: billing-paid
    precondition: authenticated, active workspace, Pro plan, billing configured
    action: open Stripe portal, cancel at period end, return to app, wait for webhook sync
    to: billing-paid-canceling
    note: "Billing tab should show end-date copy and keep the paid plan until the period ends."

  - from: billing-invoices-more
    precondition: authenticated, active workspace, paid plan, invoices paginated
    action: click "Load more"
    to: billing-invoices-populated
    note: "Appends another invoice page without losing the existing rows"

paths:
  hobby-to-pro-upgrade:
    description: "Hobby workspace upgrades to Pro through checkout and returns with paid billing state"
    precondition: authenticated, active workspace, hobby plan, billing configured
    sequence: [billing-hobby, billing-plan-dialog, checkout-redirect, billing-paid]

  hobby-to-ultra-upgrade:
    description: "Hobby workspace upgrades to Ultra through checkout and returns with paid billing state"
    precondition: authenticated, active workspace, hobby plan, billing configured
    sequence: [billing-hobby, billing-plan-dialog, checkout-redirect, billing-ultra]

  pro-to-ultra-upgrade:
    description: "Existing Pro workspace upgrades to Ultra through Stripe portal and local webhook sync"
    precondition: authenticated, active workspace, Pro plan, billing configured
    sequence: [billing-paid, portal-redirect, billing-ultra]

  ultra-to-pro-downgrade:
    description: "Existing Ultra workspace downgrades to Pro and local billing state reflects the applied change"
    precondition: authenticated, active workspace, Ultra plan, billing configured
    sequence: [billing-ultra, portal-redirect, billing-paid]

  paid-portal:
    description: "Paid workspace can open the Stripe billing portal"
    precondition: authenticated, active workspace, paid plan, billing configured
    sequence: [billing-paid, portal-redirect]

  cancel-at-period-end:
    description: "Canceling a paid subscription keeps the plan active until the end date and shows explicit end-date copy"
    precondition: authenticated, active workspace, paid plan canceling, billing configured
    sequence: [billing-paid, portal-redirect, billing-paid-canceling]

  invoices-history:
    description: "Billing tab shows invoice history and supports pagination"
    precondition: authenticated, active workspace, paid plan, invoices available
    sequence: [billing-invoices-populated, billing-invoices-more, billing-invoices-populated]

  unconfigured-billing:
    description: "Missing Stripe configuration shows an explicit template-dev state"
    precondition: authenticated, active workspace, billing unconfigured
    sequence: [billing-unconfigured]
